model:
  type: "resnet50"
  pretrained: true
  freeze_backbone_layers: 0
  input_size: 224

training:
  batch_size: 64
  num_epochs: 25
  learning_rate: 0.001
  optimizer: "adam"
  weight_decay: 0.0001
  gradient_clip_norm: 1.0
  warmup_epochs: 3

loss:
  type: "cross_entropy"
  focal_alpha: 0.25
  focal_gamma: 2.0

callbacks:
  early_stopping_patience: 7
  checkpoint_monitor: "val_accuracy"
  checkpoint_dir: "checkpoints"
  log_dir: "logs"

scheduler:
  type: "cosine"
  T_max: 25          # must match num_epochs
  step_size: 10
  gamma: 0.1

data:
  train_path: "dataset/train"
  val_path: "dataset/val"
  test_path: "dataset/test"
  num_workers: 2      # was 4 — system max is 2
  image_extensions:
    - ".jpg"
    - ".jpeg"
    - ".png"

augmentation:
  horizontal_flip: true
  vertical_flip: true
  rotation_degrees: 15
  brightness: 0.2
  contrast: 0.2
  saturation: 0.2
  crop_scale:
    - 0.8
    - 1.0

normalization:
  mean:
    - 0.485
    - 0.456
    - 0.406
  std:
    - 0.229
    - 0.224
    - 0.225